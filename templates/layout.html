<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}AlgoViz Pro{% endblock %}</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>
    <div class="app-container">
        <aside class="sidebar" id="sidebar">
            <div class="sidebar-header">
                <div class="logo">
                    <i class="fas fa-project-diagram"></i>
                    <span class="logo-text">AlgoViz Pro</span>
                </div>
                <button class="sidebar-toggle" id="sidebarToggle">
                    <i class="fas fa-bars"></i>
                </button>
            </div>

            <nav class="sidebar-nav">
                <a href="/" class="nav-item {% if request.endpoint == 'index' %}active{% endif %}">
                    <i class="fas fa-home"></i>
                    <span>Dashboard</span>
                </a>
                <a href="/graph-coloring" class="nav-item {% if 'graph_coloring' in request.endpoint %}active{% endif %}">
                    <i class="fas fa-palette"></i>
                    <span>Graph Coloring</span>
                </a>
                <a href="/mst" class="nav-item {% if 'mst' in request.endpoint %}active{% endif %}">
                    <i class="fas fa-network-wired"></i>
                    <span>MST Algorithm</span>
                </a>
                <a href="/huffman" class="nav-item {% if 'huffman' in request.endpoint %}active{% endif %}">
                    <i class="fas fa-code"></i>
                    <span>Huffman Coding</span>
                </a>
            </nav>

            <div class="sidebar-footer">
                <div class="user-profile">
                    <div class="user-avatar">
                        <i class="fas fa-user"></i>
                    </div>
                    <div class="user-info">
                        <div class="user-name">Algorithm Expert</div>
                        <div class="user-role">Developer</div>
                    </div>
                </div>
            </div>
        </aside>

        <div class="main-content">
            <header class="header">
                <div class="breadcrumbs">
                    <i class="fas fa-home"></i>
                    {% block breadcrumbs %}
                    <span>Home</span>
                    {% endblock %}
                </div>
                <div class="header-actions">
                    <button class="header-icon">
                        <i class="fas fa-bell"></i>
                    </button>
                    <button class="header-icon">
                        <i class="fas fa-cog"></i>
                    </button>
                </div>
            </header>

            <main class="content">
                {% block content %}{% endblock %}
            </main>
        </div>
    </div>

    <script>
        const sidebar = document.getElementById('sidebar');
        const sidebarToggle = document.getElementById('sidebarToggle');

        sidebarToggle.addEventListener('click', () => {
            sidebar.classList.toggle('collapsed');
        });

        if (window.innerWidth < 768) {
            sidebar.classList.add('collapsed');
        }

        window.addEventListener('resize', () => {
            if (window.innerWidth < 768) {
                sidebar.classList.add('collapsed');
            } else {
                sidebar.classList.remove('collapsed');
            }
        });
    </script>
</body>
</html>
